<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href = "style.css" rel = "stylesheet">
    <title>Weather App</title>
</head>
<body>

    <div id="date_display_container">
        <p id="date_display"></p>
    </div>

    <form id="weather_form">
        <input type="text" id="city_input" placeholder="Search for a city..." autocomplete="off">
        <button type="submit" id="submit">Search</button>
    </form>

    <div id="weather_card">
            <div id="weather_card_display">
                <p class="display_value" id="area_display" style="color:black">Finding User Location...</p>
                <img src="" class="display_value" id="weather_display">
                <p class="display_value" id="temp_display"></p>
        </div>
    </div>

    <div id="weather_widgets">
        <div class="weather_cards" id = "humidity_card">
            <div>
                <p class="card_header"><strong>Humidity</strong></p>
                <p class="weather_number_display" id="humidity_percentage_number"></p>
                <div id="humidity_percentage_rating_display">
                    <p id="humidity_percentage_rating"></p>
                </div>
            </div>
        
            <div class="weather_card_icons">
                <img class="weather_image_icon" src="images/Humidity_Icon.png" alt="humidity icon">
                <p>100</p>
                <div id="humidity_card_scale">
                    <div id="humidity_scale_fill"></div>
                </div>
                <p>0</p>
            </div>
       </div>

       <div class="weather_cards" id="precipitation">
        <div>
            <p id="precipitation_header"><strong>Precipitation</strong></p>
            <p class="weather_number_display" id="precipitation_display" alt="Precipitation icon"></p>
            <p id="precipitation_description"></p>
        </div>
        <div class="weather_card_icons">
            <img id="precipitation_icon" src="images/Precipitation_Icon.png" alt="precipitation icon">
        </div>
    </div>

    <div class="weather_cards" id="wind">
        <div>
            <p class="card_header"><strong>Wind</strong></p>
            <div class="wind_stats">
                <p><strong>Wind Gusts</strong></p>
                <p id="wind_gusts_number_display"></p>
            </div>

            <hr>

            <div class="wind_stats">
                <p><strong>Wind Speed</strong></p>
                <p id="wind_speed_number_display"></p>
            </div>

            <hr>

            <div class="wind_stats">
                <p><strong>Wind Direction</strong></p>
                <p id="compass_direction_label"></p>    
            </div>

            <hr>
        </div>

        <div class="weather_card_icons" id="wind_icons_container">
            <img id="wind_icon" src="images/Wind_Icon.png" alt="wind icon">

            <div id="wind_compass">
                    <div class="compass_label" id="label_n">N</div>
                    <div class="compass_label" id="label_e">E</div>
                    <div class="compass_label" id="label_s">S</div>
                    <div class="compass_label" id="label_w">W</div>
                    
                    <div id="compass_needle"></div>
                </div>
        </div>
    </div>
</div>
    <script src="script.js"></script>
</body>
</html>
